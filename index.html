<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      viewport-fit=cover  → app paints into safe-area zones (iPad notch/rounded corners)
      user-scalable=no    → prevents pinch-zoom that would scale the audio UI
      maximum-scale=1     → backup for browsers that ignore user-scalable
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0" />
    <title>Elastic Groove</title>
    <meta name="description" content="Browser Groovebox — VA Synth + Samples + Elektron Sequencer" />
    <meta name="theme-color" content="#f59e0b" />

    <!-- iOS / iPadOS Add-to-Home-Screen support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://elasticgroove.app/" />
    <meta property="og:title" content="Elastic Groove" />
    <meta property="og:description" content="Browser Groovebox — VA Synth + Samples + Elektron Sequencer" />
    <meta property="og:image" content="https://elasticgroove.app/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://elasticgroove.app/" />
    <meta property="twitter:title" content="Elastic Groove" />
    <meta property="twitter:description" content="Browser Groovebox — VA Synth + Samples + Elektron Sequencer" />
    <meta property="twitter:image" content="https://elasticgroove.app/og-image.png" />
    <meta name="apple-mobile-web-app-title" content="Elastic Groove" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
